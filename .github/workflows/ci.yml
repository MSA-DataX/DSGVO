name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to avoid wasted minutes when
# someone pushes twice in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        # Skip `playwright install chromium` — the test suite is pure
        # unit tests against scoring/consent_diff/form_analyzer and never
        # launches a browser. Saves ~2 minutes per CI run.

      - name: Run pytest
        run: pytest

  frontend:
    name: frontend (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  # ---------------------------------------------------------------------------
  # Image build + push (Phase 7b).
  # Runs ONLY on push-to-main, only after backend + frontend tests pass. Two
  # tags per image: `latest` and the 12-char git SHA — the SHA tag is what
  # APP_VERSION gets pinned to on the server, so rollback is just setting
  # APP_VERSION back and re-pulling.
  # ---------------------------------------------------------------------------
  images:
    name: build + push docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    strategy:
      fail-fast: false
      matrix:
        include:
          - context: ./backend
            image:   backend
          - context: ./frontend
            image:   frontend

    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # NEXT_PUBLIC_* are build-args only for the frontend image;
          # passing them for backend is a harmless no-op (the Dockerfile
          # doesn't declare the ARGs so they're ignored).
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL || 'http://backend:8080' }}
            NEXT_PUBLIC_SCAN_MODE=${{ vars.NEXT_PUBLIC_SCAN_MODE || 'async' }}
          # `latest` is the moving pointer; the SHA tag is what we
          # reference from docker-compose.prod.yml on the server so
          # deploys are deterministic and rollback is trivial.
          tags: |
            ghcr.io/${{ github.repository }}-${{ matrix.image }}:latest
            ghcr.io/${{ github.repository }}-${{ matrix.image }}:${{ steps.sha.outputs.short }}
          # Per-image layer cache via GHA's cache backend — saves ~60s
          # on the Playwright backend rebuild after a code-only change.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to:   type=gha,scope=${{ matrix.image }},mode=max
