[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --strict-config -q

# Async test support; we don't use it in scoring/consent/form tests but
# keep the config so future scanner/pipeline tests can go async without
# a second pytest.ini edit.
asyncio_mode = auto
